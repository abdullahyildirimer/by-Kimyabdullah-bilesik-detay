<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bileşik Detay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--panel:#12121a;--panel2:#1a1a26;--border:#1e1e2e;
  --text:#e8e8f0;--dim:#5a5a7a;--accent:#00d4ff;--glow:rgba(0,212,255,.15);
  --green:#00ff88;--yellow:#ffe600;--orange:#ff6600;--red:#ff4d6d;--purple:#b06aff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 20px;}

/* Başlık */
header{text-align:center;margin-bottom:40px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:.15em;
  color:#ff00cc;text-shadow:0 0 40px rgba(255,0,204,.5),0 0 80px rgba(255,0,204,.2);margin-bottom:6px;}
.subtitle{font-size:.6rem;color:var(--dim);letter-spacing:.25em;text-transform:uppercase;}

/* Giriş */
.input-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:24px;margin-bottom:20px;position:relative;overflow:hidden;}
.input-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.input-label{font-size:.55rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;display:block;}
.input-row{display:flex;gap:8px;}
#inp{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:'Space Mono',monospace;font-size:.85rem;padding:11px 14px;outline:none;
  transition:border-color .2s,box-shadow .2s;}
#inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow);}
#inp::placeholder{color:var(--dim);}
#btn-go{background:var(--accent);color:#000;border:none;border-radius:3px;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;
  padding:11px 22px;cursor:pointer;transition:all .2s;white-space:nowrap;}
#btn-go:hover{background:#00eeff;box-shadow:0 0 20px rgba(0,212,255,.4);}
#btn-x{background:none;color:var(--dim);border:1px solid var(--border);border-radius:3px;
  font-size:.65rem;padding:11px 13px;cursor:pointer;transition:all .2s;}
#btn-x:hover{border-color:var(--red);color:var(--red);}

/* Hata */
#err{background:rgba(255,77,109,.06);border:1px solid rgba(255,77,109,.3);border-radius:6px;
  padding:18px 22px;display:none;animation:fadeIn .3s;}
.err-t{font-size:.52rem;color:var(--red);letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;}
.err-m{font-size:.68rem;color:var(--text);line-height:1.7;}

/* Sonuç */
#res{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:24px;display:none;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.res-tur{font-size:.5rem;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;}
.res-ana{font-family:'Bebas Neue',sans-serif;font-size:2.3rem;letter-spacing:.06em;
  color:var(--green);text-shadow:0 0 20px rgba(0,255,136,.3);margin-bottom:6px;word-break:break-all;line-height:1.1;}
.res-alt{font-size:.63rem;color:var(--dim);line-height:1.8;margin-bottom:14px;}
.res-alt b{color:var(--text);}
.divider{height:1px;background:var(--border);margin:14px 0;}

/* Grid'ler */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:7px;}
@media(max-width:580px){.grid2{grid-template-columns:1fr;}.grid3{grid-template-columns:1fr 1fr;}}
.kart{background:var(--panel2);border-radius:3px;padding:9px 11px;border:1px solid var(--border);}
.kart-k{font-size:.44rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;}
.kart-v{font-size:.65rem;color:var(--text);font-weight:700;line-height:1.4;}
.kart-v.g{color:var(--green);}
.kart-v.y{color:var(--yellow);}
.kart-v.o{color:var(--orange);}
.kart-v.r{color:var(--red);}
.kart-v.p{color:var(--purple);}

/* Bölüm başlığı */
.bolum{font-size:.48rem;color:var(--purple);letter-spacing:.2em;text-transform:uppercase;
  margin:14px 0 6px;border-top:1px solid var(--border);padding-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>BİLEŞİK DETAY</h1>
    <p class="subtitle">Formül &rarr; İsim &nbsp;&middot;&nbsp; İsim &rarr; Formül &nbsp;&middot;&nbsp; Özellikler</p>
  </header>

  <div class="input-card">
    <label class="input-label" for="inp">Formül veya Bileşik Adı Girin</label>
    <div class="input-row">
      <input type="text" id="inp" placeholder="Formül veya bileşik adı..." autocomplete="off" spellcheck="false">
      <button id="btn-go" onclick="cevir()">DÖNÜŞTÜR</button>
      <button id="btn-x" onclick="temizle()">✕</button>
    </div>
  </div>

  <div id="err">
    <div class="err-t">&#9888; Tanınamadı</div>
    <div class="err-m" id="err-m"></div>
  </div>

  <div id="res">
    <div class="res-tur" id="res-tur"></div>
    <div class="res-ana" id="res-ana"></div>
    <div class="res-alt" id="res-alt"></div>
    <div class="divider"></div>
    <div class="grid2" id="grid-temel"></div>
    <div class="bolum" id="bolum-hesap" style="display:none">⚗ Hesaplanan Özellikler</div>
    <div class="grid3" id="grid-hesap"></div>
    <div class="bolum" id="bolum-db" style="display:none">📋 Veritabanı Bilgileri</div>
    <div class="grid3" id="grid-db"></div>
  </div>

// YARDIMCI FONKSİYONLAR
// ══════════════════════════════════════════
function gcd(a,b){ return b===0?a:gcd(b,a%b); }
function dengele(a,b){ const g=gcd(Math.abs(a),Math.abs(b)); return [Math.abs(b)/g, Math.abs(a)/g]; }
function toRoman(n){ return {1:'I',2:'II',3:'III',4:'IV',5:'V',6:'VI',7:'VII',8:'VIII'}[n]||String(n); }
function fromRoman(r){ return {i:1,ii:2,iii:3,iv:4,v:5,vi:6,vii:7,viii:8}[r.toLowerCase()]||1; }

function toSub(f){
  return f.replace(/(\d+)/g, n=>[...n].map(c=>'₀₁₂₃₄₅₆₇₈₉'[+c]).join(''));
}
function normF(f){
  return f.replace(/[₀₁₂₃₄₅₆₇₈₉]/g, c=>'0123456789'['₀₁₂₃₄₅₆₇₈₉'.indexOf(c)]).trim();
}

// Parantez açma: Al2(SO4)3 → Al2SO4SO4SO4  (max 10 iterasyon)
function parantezAc(f){
  for(let i=0;i<10;i++){
    const y = f.replace(/\(([^()]+)\)(\d+)/g, (m,ic,n)=>ic.repeat(Math.min(+n,8)));
    if(y===f) break;
    f=y;
  }
  return f;
}

// Mol kütlesi hesabı
function molKutle(f){
  if(!f || f.length>60) return null;
  f = normF(f);
  f = parantezAc(f);
  if(f.length>300) return null;
  let total=0;
  const re=/([A-Z][a-z]?)(\d*)/g;
  let m;
  while((m=re.exec(f))!==null){
    const el=EL[m[1]];
    if(el) total += el.kutle * (parseInt(m[2]||'1'));
  }
  return total>0 ? total.toFixed(2) : null;
}

// Organik bileşik türü
function orgTur(f){
  if(f.includes('NH')) return 'Amin';
  if(f.includes('COOH')||f==='HCOOH') return 'Karboksilik Asit';
  if(f.includes('COO')) return 'Ester';
  if(f.includes('CHO')||f==='HCHO') return 'Aldehit';
  if(f.includes('CO')&&!f.includes('COOH')&&!f.includes('COO')) return 'Keton';
  if(f.includes('OH')) return 'Alkol';
  if(f.includes('O')&&!f.includes('OH')) return 'Eter';
  const c=parseInt((f.match(/C(\d*)/)||[,'1'])[1]||'1');
  const h=parseInt((f.match(/H(\d+)/)||[,'0'])[1]);
  if(h===2*c+2) return 'Alkan';
  if(h===2*c) return 'Alken';
  if(h===2*c-2) return 'Alkin';
  return 'Organik Bileşik';
}

// Asit-baz tahmini
const KUV_BAZ_MET = new Set(['Na','K','Li','Rb','Cs','Ca','Sr','Ba']);
const KUV_ASIT_ANY = new Set(['Cl','Br','I','NO3','ClO4','ClO3']);
const ZAYIF_ASIT_ANY = new Set(['CH3COO','HCOO','CN','CO3','HCO3','SO3','PO4','F','NO2','C2O4']);

function asitBazTahmini(metSym, anySym){
  const km = KUV_BAZ_MET.has(metSym);
  const ka = KUV_ASIT_ANY.has(anySym);
  const za = ZAYIF_ASIT_ANY.has(anySym);
  if(km && ka)  return {v:'Nötr (pH ≈ 7)',cls:'g'};
  if(km && za)  return {v:'Bazik (pH > 7)',cls:'g'};
  if(!km && ka) return {v:'Asidik (pH < 7)',cls:'o'};
  if(!km && za) return {v:'Zayıf asidik/bazik',cls:'y'};
  return null;
}

function cevir(){
  const raw = document.getElementById('inp').value.trim();
  if(!raw){ hata('Lütfen bir formül veya bileşik adı girin.'); return; }

  let r = null;

  const nf = normF(raw);

  // 1. Organik — formül
  if(!r && ORG_F[nf]){
    const isim = ORG_F[nf];
    r = {tur:'Formül → İsim · Organik', ana:isim, alt:`Formül: <b>${toSub(nf)}</b>`,
      formul:nf,
      det:[{k:'Tür',v:orgTur(nf)},{k:'Formül',v:toSub(nf)},{k:'İsim',v:isim}]};
  }

  // 2. Organik — isim
  if(!r){
    const key = raw.toLowerCase().trim();
    const f = ORG_I[key];
    if(f){
      r = {tur:'İsim → Formül · Organik', ana:toSub(f), alt:`İsim: <b>${ORG_F[f]}</b>`,
        formul:f,
        det:[{k:'Tür',v:orgTur(f)},{k:'Formül',v:toSub(f)},{k:'İsim',v:ORG_F[f]}]};
    }
  }

  // 3. Asit — formül
  if(!r && ASIT_F[nf]){
    const a = ASIT_F[nf];
    r = {tur:'Formül → İsim · Asit', ana:a.isim+(a.alt?` (${a.alt})`:''),
      alt:`Formül: <b>${toSub(nf)}</b>`, formul:nf,
      det:[{k:'Tür',v:a.tur},{k:'Formül',v:toSub(nf)},{k:'İsim',v:a.isim}]};
  }

  // 4. Asit — isim
  if(!r){
    const key = raw.toLowerCase().replace(/asiti$/,'asit').trim();
    for(const [f,a] of Object.entries(ASIT_F)){
      if(a.isim.toLowerCase()===key||(a.alt&&a.alt.toLowerCase()===key)){
        r = {tur:'İsim → Formül · Asit', ana:toSub(f), alt:`İsim: <b>${a.isim}</b>`,
          formul:f,
          det:[{k:'Tür',v:a.tur},{k:'Formül',v:toSub(f)},{k:'İsim',v:a.isim}]};
        break;
      }
    }
  }

  // 5. Baz — formül
  if(!r && BAZ_F[nf]){
    const b = BAZ_F[nf];
    r = {tur:'Formül → İsim · Baz', ana:b.isim+(b.alt?` (${b.alt})`:''),
      alt:`Formül: <b>${toSub(nf)}</b>`, formul:nf,
      det:[{k:'Tür',v:b.tur},{k:'Formül',v:toSub(nf)},{k:'İsim',v:b.isim}]};
  }

  // 6. Baz — isim
  if(!r){
    const key = raw.toLowerCase().trim();
    for(const [f,b] of Object.entries(BAZ_F)){
      if(b.isim.toLowerCase()===key){
        r = {tur:'İsim → Formül · Baz', ana:toSub(f), alt:`İsim: <b>${b.isim}</b>`,
          formul:f,
          det:[{k:'Tür',v:b.tur},{k:'Formül',v:toSub(f)},{k:'İsim',v:b.isim}]};
        break;
      }
    }
  }

  // 7. İkili bileşik — formül (sadece gerçek formüller: harf+rakam)
  if(!r && /^[A-Za-z0-9()]+$/.test(raw)){
    r = formuldenIsim(nf);
  }

  // 8. İkili bileşik — isim
  if(!r){
    r = isimdenFormul(raw);
  }

  if(r) goster(r);
  else hata(`"${raw}" tanınamadı.<br><br><b>Örnekler:</b> NaCl · sodyum klorür · H₂SO₄ · sülfürik asit · CH₄ · metan · demir(III) oksit · alüminyum sülfat`);
}

// FORMÜL → İSİM (tam kural tabanlı)
// ══════════════════════════════════════════

// Tüm poliatomik anyon sembolleri uzundan kısaya sıralı (önce uzun eşleş)
const POLI_SEMBOLLER = Object.keys(ANYON_P_SYM).sort((a,b)=>b.length-a.length);

// Formülü parçala: metal kısmı + anyon kısmı
// Desteklenen formatlar:
//   NaCl, Fe2O3, CO2, SO3          (basit: MetalNAnyon N)
//   Al2(SO4)3, Fe(NO3)3            (parantezli: Metal_n(Anyon)_n)
//   KMnO4, NaHCO3, Na2CrO4        (metal + uzun poliatomik, parantez yok)

function formuldenIsim(f){
  f = normF(f);

  // ── 1. Parantezli: Metal_n(Anyon)_n ──
  const mP = f.match(/^([A-Z][a-z]?)(\d*)\(([^)]+)\)(\d+)$/);
  if(mP){
    const metSym=mP[1], metN=parseInt(mP[2]||'1');
    const anySym=mP[3], anyN=parseInt(mP[4]);
    return bilesikSonuc(metSym, metN, anySym, anyN, true, f);
  }

  // ── 2. Metal + poliatomik anyon (parantez yok): KMnO4, Na2SO4, NaHCO3 ──
  // Tüm element sembollerini dene — uzun poliatomik önce
  for(const elSym of Object.keys(EL)){
    if(!f.startsWith(elSym)) continue;
    // Sonrasındaki rakam: metal adedi
    const sonrasi = f.slice(elSym.length);
    const rkM = sonrasi.match(/^(\d*)([\s\S]+)$/);
    if(!rkM) continue;
    const metN = parseInt(rkM[1]||'1');
    const kalan = rkM[2];
    // Kalan kısımda poliatomik anyon ara (uzundan kısaya)
    for(const anySym of POLI_SEMBOLLER){
      // kalan = AnySym + anyN
      if(!kalan.startsWith(anySym)) continue;
      const sonrakiRak = kalan.slice(anySym.length);
      const anyN = parseInt(sonrakiRak||'1');
      // Sadece rakam (veya boş) kalmalı
      if(sonrakiRak!=='' && !/^\d+$/.test(sonrakiRak)) continue;
      const r = bilesikSonuc(elSym, metN, anySym, anyN, true, f);
      if(r) return r;
    }
  }

  // ── 3. Basit ikili: NaCl, Fe2O3, CO2 ──
  const parts = [];
  const reEl = /([A-Z][a-z]?)(\d*)/g;
  let m;
  while((m=reEl.exec(f))!==null){ if(m[1]) parts.push({s:m[1],n:parseInt(m[2]||'1')}); }
  if(parts.length===2){
    const [A,B] = parts;
    const eA=EL[A.s], eB=EL[B.s];
    if(eA && eB){
      const ai = ANYON1[B.s];
      if(ai){
        const isMetalA = !['ametal','halojen','soy gaz','yari metal'].includes(eA.tur);
        const fStr = toSub(`${A.s}${A.n>1?A.n:''}${B.s}${B.n>1?B.n:''}`);
        let isim='';
        let yuk = eA.yuks[0];
        if(isMetalA){
          const hesapYuk = -(ai.yuk*B.n)/A.n;
          if(Number.isInteger(hesapYuk)) yuk=hesapYuk;
          const romStr = eA.yuks.length>1?` (${toRoman(yuk)})`:'';
          isim = `${eA.ad}${romStr} ${ai.ad}`;
        } else {
          const PREF=['','mono','di','tri','tetra','penta','heksa','hepta','okta','nona','deka'];
          const pA = A.n>1?PREF[A.n]:'';
          let pB = PREF[B.n]||'';
          if(pB&&pB.slice(-1)==='a'&&['a','e','i','o','u'].includes(ai.ad[0])) pB=pB.slice(0,-1);
          isim = `${pA}${eA.ad.toLowerCase()} ${pB}${ai.ad}`;
          isim = isim[0].toUpperCase()+isim.slice(1);
        }
        return {tur:'Formül → İsim · İkili Bileşik', ana:isim, alt:`Formül: <b>${fStr}</b>`,
          formul:`${A.s}${A.n>1?A.n:''}${B.s}${B.n>1?B.n:''}`,
          metSym:A.s, anySym:B.s, metYuk:yuk,
          det:[{k:'A Elementi',v:`${A.s} — ${eA.ad}`},{k:'B Elementi',v:`${B.s} — ${eB.ad}`},
            {k:'Formül',v:fStr},{k:'İsim',v:isim}]};
      }
    }
  }
  return null;
}

// Ortak tuz/bileşik sonucu oluştur
function bilesikSonuc(metSym, metN, anySym, anyN, parantezli, fOrijinal){
  const el = EL[metSym];
  const anyAd = ANYON_P_SYM[anySym];
  if(!el || !anyAd) return null;
  const anyYuk = ANYON_P[anyAd] ? ANYON_P[anyAd].yuk : -1;
  const metYuk = -(anyYuk*anyN)/metN;
  const gercekYuk = Number.isInteger(metYuk) ? metYuk : el.yuks[0];
  const romStr = el.yuks.length>1 ? ` (${toRoman(gercekYuk)})` : '';
  const isim = `${el.ad}${romStr} ${anyAd}`;
  const fStr = parantezli && anyN>1
    ? toSub(`${metSym}${metN>1?metN:''}(${anySym})${anyN}`)
    : toSub(`${metSym}${metN>1?metN:''}${anySym}${anyN>1?anyN:''}`);
  return {
    tur:'Formül → İsim · Tuz', ana:isim, alt:`Formül: <b>${fStr}</b>`,
    formul:fOrijinal, metSym, anySym, metYuk:gercekYuk,
    det:[
      {k:'Metal', v:`${metSym} — ${el.ad}`},
      {k:'Anyon',  v:`${anySym} — ${anyAd}`},
      {k:'Yükseltgenme', v:`+${gercekYuk}`},
      {k:'Formül', v:fStr},
      {k:'İsim',   v:isim},
    ]
  };
}

// ══════════════════════════════════════════
// İSİM → FORMÜL
// ══════════════════════════════════════════
function isimdenFormul(raw){
  const s = raw.toLowerCase().trim();

  // Metal sembolünü bul (parantez öncesi kelime)
  // Örn: "demir(III) perklorat" → metal="demir", roman="III", anyon="perklorat"
  // Örn: "sodyum klorür" → metal="sodyum", roman="", anyon="klorür"

  // Regex: metal_adı (roman_rakam) anyon_adı — güvenli, backtracking yok
  const re1 = /^([a-zçğıöşüâîû]+)\(([ivxIVX]+)\)\s+([a-zçğıöşüâîû\s]+)$/;
  const re2 = /^([a-zçğıöşüâîû]+)\s+([a-zçğıöşüâîû\s]+)$/;

  let metalAdi='', roman='', anyonAdi='';

  const m1 = s.match(re1);
  if(m1){ metalAdi=m1[1]; roman=m1[2]; anyonAdi=m1[3].trim(); }
  else {
    const m2 = s.match(re2);
    if(m2){ metalAdi=m2[1]; anyonAdi=m2[2].trim(); }
    else return null;
  }

  // Hem direkt hem küçük harfli ara
  const sym = AD[metalAdi] || AD[metalAdi.toLowerCase()];
  if(!sym || !EL[sym]) return null;
  const el = EL[sym];
  const yuk = roman ? fromRoman(roman) : el.yuks[0];

  // Hidroksit özel durum
  if(anyonAdi==='hidroksit'){
    const [mN,ohN] = dengele(yuk,1);
    const f = mN>1?`${sym}${mN}(OH)${ohN}`:(ohN>1?`${sym}(OH)${ohN}`:`${sym}OH`);
    const romStr = el.yuks.length>1?` (${toRoman(yuk)})`:'';
    return {tur:'İsim → Formül · Baz', ana:toSub(f),
      alt:`İsim: <b>${el.ad}${romStr} hidroksit</b>`, formul:f,
      metSym:sym, anySym:'OH', metYuk:yuk,
      det:[{k:'Metal',v:`${sym} — ${el.ad}`},{k:'Yükseltgenme',v:`+${yuk}`},
        {k:'Formül',v:toSub(f)},{k:'Tür',v:'Hidroksit (Baz)'}]};
  }

  // Tek atomlu anyon
  for(const [asym,ai] of Object.entries(ANYON1)){
    if(ai.ad===anyonAdi){
      const [mN,aN] = dengele(yuk, Math.abs(ai.yuk));
      const f = `${sym}${mN>1?mN:''}${asym}${aN>1?aN:''}`;
      const romStr = el.yuks.length>1?` (${toRoman(yuk)})`:'';
      return {tur:'İsim → Formül · İkili Bileşik', ana:toSub(f),
        alt:`İsim: <b>${el.ad}${romStr} ${anyonAdi}</b>`, formul:f,
        metSym:sym, anySym:asym, metYuk:yuk,
        det:[{k:'Metal',v:`${sym} — ${el.ad}`},{k:'Anyon',v:`${asym} — ${anyonAdi}`},
          {k:'Yükseltgenme',v:`+${yuk}`},{k:'Formül',v:toSub(f)}]};
    }
  }

  // Poliatomik anyon
  const pi = ANYON_P[anyonAdi];
  if(pi){
    const [mN,aN] = dengele(yuk, Math.abs(pi.yuk));
    const grup = aN>1?`(${pi.s})${aN}`:pi.s;
    const f = `${sym}${mN>1?mN:''}${grup}`;
    const romStr = el.yuks.length>1?` (${toRoman(yuk)})`:'';
    return {tur:'İsim → Formül · Tuz', ana:toSub(f),
      alt:`İsim: <b>${el.ad}${romStr} ${anyonAdi}</b>`, formul:f,
      metSym:sym, anySym:pi.s, metYuk:yuk,
      det:[{k:'Metal',v:`${sym} — ${el.ad}`},{k:'Anyon',v:`${pi.s} (${anyonAdi})`},
        {k:'Yükseltgenme',v:`+${yuk}`},{k:'Formül',v:toSub(f)},{k:'Tür',v:'Tuz'}]};
  }

  return null;
}

// ══════════════════════════════════════════
function kart(k,v,cls=''){
  return `<div class="kart"><div class="kart-k">${k}</div><div class="kart-v ${cls}">${v}</div></div>`;
}

function goster(r){
  document.getElementById('err').style.display='none';
  document.getElementById('res').style.display='block';
  document.getElementById('res-tur').textContent = r.tur;

  const ana = document.getElementById('res-ana');
  const isFormul = r.tur.startsWith('İsim');
  ana.style.fontFamily = isFormul?"'Space Mono',monospace":"'Bebas Neue',sans-serif";
  ana.style.fontSize = isFormul?'1.7rem':'2.3rem';
  ana.innerHTML = r.ana;
  document.getElementById('res-alt').innerHTML = r.alt||'';

  // Temel kartlar
  document.getElementById('grid-temel').innerHTML = r.det.map(d=>kart(d.k,d.v)).join('');

  // ── Hesaplanan Özellikler ──
  const hesap = [];

  // Mol kütlesi
  const mk = molKutle(r.formul||'');
  if(mk) hesap.push({k:'Mol Kütlesi',v:`${mk} g/mol`,cls:'y'});

  // Elektron transferi
  if(r.metSym && r.anySym && r.metYuk){
    const el = EL[r.metSym];
    const elAd = el?el.ad:r.metSym;
    hesap.push({k:'Elektron Veren',v:`${elAd} → +${r.metYuk}`,cls:'g'});
    hesap.push({k:'Elektron Alan',v:`${r.anySym}`,cls:'o'});
  }

  // Asit-baz
  if(r.metSym && r.anySym){
    const ab = asitBazTahmini(r.metSym, r.anySym);
    if(ab) hesap.push({k:'Tuz Hidrolizi',v:ab.v,cls:ab.cls});
  }

  const bH = document.getElementById('bolum-hesap');
  const gH = document.getElementById('grid-hesap');
  if(hesap.length>0){
    bH.style.display='block';
    gH.innerHTML = hesap.map(d=>kart(d.k,d.v,d.cls||'')).join('');
  } else { bH.style.display='none'; gH.innerHTML=''; }

  // ── Veritabanı Bilgileri ──
  const fKey = r.formul||'';
  const db = DB[fKey];
  const bD = document.getElementById('bolum-db');
  const gD = document.getElementById('grid-db');
  if(db){
    bD.style.display='block';
    const cc = db.c==='Çözünür'?'g':db.c==='Çözünmez'?'r':'y';
    const tc = db.t==='Zararsız'?'g':db.t.includes('Zehirli')||db.t.includes('Kanserojen')?'r':'o';
    gD.innerHTML =
      kart('Renk / Görünüm',db.r) +
      kart('Çözünürlük',db.c,cc) +
      kart('Kullanım Alanı',db.k) +
      kart('Tehlike',db.t,tc);
  } else { bD.style.display='none'; gD.innerHTML=''; }
}

function hata(msg){
  document.getElementById('res').style.display='none';
  document.getElementById('err').style.display='block';
  document.getElementById('err-m').innerHTML=msg;
}

function temizle(){
  document.getElementById('inp').value='';
  document.getElementById('res').style.display='none';
  document.getElementById('err').style.display='none';
}

document.getElementById('inp').addEventListener('keydown', e=>{ if(e.key==='Enter') cevir(); });
</script>
</body>
</html>
